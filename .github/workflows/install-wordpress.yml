name: WordPress 설치 (PHP CLI + SQLite)

on:
  workflow_dispatch:
    inputs:
      force_reinstall:
        description: '강제 재설치'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    env:
      ADMIN_USER: "wp_hhioems2"
      ADMIN_PASS: "2CT$wa&I5Nf$Den2"
      ADMIN_EMAIL: "admin@a644e615.cloudpress.app"
      SITE_URL: "https://cp-a644e615-wp.choichoi3227.workers.dev"
      SITE_NAME: "인포팡팡"
      DB_PREFIX: "wp_"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PHP 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y php-cli php-sqlite3 php-mbstring php-xml php-curl php-zip php-gd php-intl sqlite3 curl unzip rsync

      - name: WP-CLI 설치
        run: |
          curl -sL "https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar" -o /usr/local/bin/wp
          chmod +x /usr/local/bin/wp

      - name: WordPress 다운로드
        run: |
          if [ -f "wp-load.php" ] && [ "${{ github.event.inputs.force_reinstall }}" != "true" ]; then
            echo "WordPress 이미 존재 - 건너뜀"
          else
            curl -sL "https://wordpress.org/latest.zip" -o /tmp/wordpress.zip
            unzip -q /tmp/wordpress.zip -d /tmp/wp_extract/
            mkdir -p wordpress
            rsync -a --delete               --exclude='.git/'               --exclude='.github/'               /tmp/wp_extract/wordpress/ ./wordpress/
            echo "WordPress 다운로드 완료"
          fi

      - name: SQLite Integration 플러그인 설치
        run: |
          mkdir -p wordpress/wp-content/plugins _db
          touch _db/.gitkeep
          chmod 777 _db
          if [ ! -d "wordpress/wp-content/plugins/sqlite-database-integration" ]; then
            curl -sL "https://downloads.wordpress.org/plugin/sqlite-database-integration.latest-stable.zip" -o /tmp/sqlite.zip
            unzip -q /tmp/sqlite.zip -d wordpress/wp-content/plugins/
          fi
          # db.copy → db.php 생성 + 플레이스홀더 치환
          DB_COPY="wordpress/wp-content/plugins/sqlite-database-integration/db.copy"
          PLUGIN_PATH="$(pwd)/wordpress/wp-content/plugins/sqlite-database-integration"
          if [ -f "$DB_COPY" ]; then
            cp -f "$DB_COPY" wordpress/wp-content/db.php
            sed -i "s|{SQLITE_IMPLEMENTATION_FOLDER_PATH}|${PLUGIN_PATH}|g" wordpress/wp-content/db.php
            sed -i "s|{SQLITE_PLUGIN}|sqlite-database-integration/load.php|g" wordpress/wp-content/db.php
            echo "db.php 생성 완료"
          else
            echo "경고: db.copy 없음"
          fi
          echo "SQLite 플러그인 준비 완료"

      - name: wp-config.php 생성
        run: |
          WP_CFG_URL="${SITE_URL:-https://cp-a644e615-wp.choichoi3227.workers.dev}"
          # _db/ 폴더 확인 및 생성 (레포 루트에 위치해야 함)
          mkdir -p _db
          chmod 777 _db
          {
            echo '<?php'
            echo "// CloudPress 자동 생성 wp-config.php (SQLite + UTF-8)"
            echo "// DB_DIR: wordpress/ 폴더 한 단계 위의 _db/ (레포 루트)"
            echo "define('DB_DIR',  __DIR__ . '/../_db/');"
            echo "define('DB_FILE', 'wordpress.db');"
            echo "define('DB_ENGINE', 'sqlite');"
            echo "define('AUTH_KEY',         'put your unique phrase here 1');"
            echo "define('SECURE_AUTH_KEY',  'put your unique phrase here 2');"
            echo "define('LOGGED_IN_KEY',    'put your unique phrase here 3');"
            echo "define('NONCE_KEY',        'put your unique phrase here 4');"
            echo "define('AUTH_SALT',        'put your unique phrase here 5');"
            echo "define('SECURE_AUTH_SALT', 'put your unique phrase here 6');"
            echo "define('LOGGED_IN_SALT',   'put your unique phrase here 7');"
            echo "define('NONCE_SALT',       'put your unique phrase here 8');"
            echo "\$table_prefix = 'wp_';"
            echo "define('WP_HOME',    getenv('SITE_URL') ?: '\$WP_CFG_URL');"
            echo "define('WP_SITEURL', getenv('SITE_URL') ?: '\$WP_CFG_URL');"
            echo "define('WP_CONTENT_DIR', __DIR__ . '/wp-content');"
            echo "define('WP_DEBUG', false);"
            echo "if ( ! defined( 'ABSPATH' ) ) { define( 'ABSPATH', __DIR__ . '/' ); }"
            echo "require_once ABSPATH . 'wp-settings.php';"
          } > wordpress/wp-config.php
          echo "wp-config.php 생성 완료"
          # _db/ 경로 확인
          echo "_db/ 위치: $(pwd)/_db/"
          ls -la _db/ || true

      - name: WordPress 설치 (WP-CLI)
        run: |
          wp core install \
            --url="\$SITE_URL" \
            --title="\$SITE_NAME" \
            --admin_user="\$ADMIN_USER" \
            --admin_password="\$ADMIN_PASS" \
            --admin_email="\$ADMIN_EMAIL" \
            --skip-email \
            --allow-root \
            --path=./wordpress 2>&1 || echo "이미 설치됨 또는 재설치 진행"
          wp plugin activate sqlite-database-integration --allow-root --path=./wordpress 2>&1 || true
          wp option update siteurl "\$SITE_URL" --allow-root --path=./wordpress 2>&1 || true
          wp option update home "\$SITE_URL" --allow-root --path=./wordpress 2>&1 || true
          echo "✅ WordPress 설치 완료"

      - name: 기본 플러그인 설치
        run: |
          wp plugin install classic-editor --activate --allow-root --path=./wordpress 2>&1 || true
          # _plugins/ → wordpress/wp-content/plugins/ 복사 및 활성화
          if [ -d "_plugins/aibp-pro" ]; then
            cp -r _plugins/aibp-pro wordpress/wp-content/plugins/
            wp plugin activate aibp-pro --allow-root --path=./wordpress 2>&1 || true
            echo "aibp-pro 활성화 완료"
          fi
          if [ -f "_plugins/wp-rocket.zip" ]; then
            wp plugin install _plugins/wp-rocket.zip --activate --allow-root --path=./wordpress 2>&1 || true
            echo "wp-rocket 설치 완료"
          fi
          echo "기본 플러그인 설치 완료"

      - name: PHP 서버로 초기 캐시 생성
        run: |
          # PHP 내장 서버로 빠르게 WordPress 렌더링 → _cache/index.html 생성
          sudo apt-get install -y php-cli php-sqlite3 php-mbstring php-xml php-curl php-zip php-gd php-intl -qq 2>/dev/null || true
          mkdir -p _cache
          # 로케일/인코딩 설정 (한국어 깨짐 방지)
          export LANG=ko_KR.UTF-8
          export LC_ALL=ko_KR.UTF-8
          sudo locale-gen ko_KR.UTF-8 2>/dev/null || true
          # PHP ini: UTF-8 인코딩 강제
          PHP_INI_EXTRA=$(mktemp --suffix=.ini)
          echo "default_charset = UTF-8" > "$PHP_INI_EXTRA"
          echo "mbstring.internal_encoding = UTF-8" >> "$PHP_INI_EXTRA"
          echo "mbstring.http_output = pass" >> "$PHP_INI_EXTRA"
          echo "output_buffering = 4096" >> "$PHP_INI_EXTRA"
          # wp-config.php 에 localhost URL 임시 주입 (WP 리다이렉트 방지)
          WP_CFG=wordpress/wp-config.php
          cp -f "$WP_CFG" "$WP_CFG.bak" 2>/dev/null || true
          # getenv() 방식이므로 define 값 직접 치환
          sed -i "s|define('WP_HOME'.*|define('WP_HOME',    'http://localhost:9090');|" "$WP_CFG" 2>/dev/null || true
          sed -i "s|define('WP_SITEURL'.*|define('WP_SITEURL', 'http://localhost:9090');|" "$WP_CFG" 2>/dev/null || true
          # PHP 내장 서버 (백그라운드) - UTF-8 ini 포함
          php -c "$PHP_INI_EXTRA" -S localhost:9090 -t ./wordpress > /tmp/php-server.log 2>&1 &
          PHP_PID=$!
          sleep 5
          # 메인 페이지 캐시 (UTF-8 헤더 명시)
          HTTP=$(curl -L -o _cache/index.html -s -w "%{http_code}" --max-time 30             -H "Host: localhost"             -H "Accept-Charset: utf-8"             -H "Accept: text/html,application/xhtml+xml"             "http://localhost:9090/" 2>/dev/null || echo "000")
          echo "캐시 HTTP: $HTTP"
          # 추가 주요 페이지 캐시
          for SLUG in wp-login.php wp-json; do
            curl -sf --max-time 10 "http://localhost:9090/$SLUG"               -H "Accept-Charset: utf-8"               -o "_cache/$SLUG" 2>/dev/null || true
          done
          kill $PHP_PID 2>/dev/null || true
          # wp-config.php 원복 (실제 SITE_URL 복원)
          cp -f "$WP_CFG.bak" "$WP_CFG" 2>/dev/null || true
          rm -f "$PHP_INI_EXTRA"
          # index.html 이 정상적인 HTML인지 확인
          if [ -f _cache/index.html ] && grep -qi "<html" _cache/index.html 2>/dev/null; then
            echo "✅ 초기 캐시 생성 성공 ($(wc -c < _cache/index.html) bytes)"
          else
            rm -f _cache/index.html
            echo "⚠️ PHP 렌더링 실패 - _cache/index.html 생성 생략"
          fi

      - name: 파일 커밋 & 푸시
        run: |
          git config user.name "CloudPress Bot"
          git config user.email "bot@cloudpress.app"
          git config http.postBuffer 524288000
          echo "_db/wordpress.db" >> .gitignore || true
          git rm --cached _db/wordpress.db 2>/dev/null || true
          git add wordpress/ 2>/dev/null || true
          git add _db/.gitkeep .gitignore 2>/dev/null || true
          git add _cache/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 건너뜀"
          else
            git commit -m "WordPress 설치 완료"
            # race condition 방지: pull --rebase 후 최대 5회 재시도
            for i in 1 2 3 4 5; do
              git pull --rebase origin main 2>/dev/null || true
              git push origin main && break
              echo "Push 충돌 재시도 ($i/5)..."
              sleep $((i * 3))
            done
          fi
          echo "완료"
